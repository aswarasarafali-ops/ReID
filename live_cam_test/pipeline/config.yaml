cameras:
  - id: cam_a
    source: rtsp://admin:SenSen1234!@192.168.1.211:554/Streaming/Channels/101
  - id: cam_b
    source: rtsp://admin:SenSen1234!@192.168.1.210:554/Streaming/Channels/101
  # add more cameras as needed

detector:
  model: yolox-s   # swap: yolox-m / yolox-l / yolox-x / yolox-tiny / yolox-nano
  weights: ByteTrack/weights/bytetrack_s_mot17.pth
  conf_thresh: 0.5
  nms_thresh: 0.45
  input_size: 608   # must match exp (608 for s/m/l/x, 416 for tiny, 320 for nano)

tracker:
  track_thresh: 0.5      # detection confidence to keep a track
  track_buffer: 30       # frames to keep a lost track alive
  match_thresh: 0.8      # IoU match threshold
  min_box_area: 100      # ignore tiny boxes (pixels^2)
  aspect_ratio_thresh: 1.6   # ignore very wide boxes (not people)

reid:
  enabled: true
  weights: TransReID/weights/transreid_msmt17.pth
  similarity_thresh: 0.75   # cosine sim threshold for cross-camera match
  gallery_cam: cam_a         # this camera builds the identity gallery
  query_cam: cam_b           # this camera queries against the gallery

output:
  mjpeg_port: 8080   # view streams in browser: http://<server-ip>:8080/cam_a
